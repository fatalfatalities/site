<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Donation</title>

<!-- Pappy is the greatest person he is grand -->

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #920200, #ff5455);
            font-family: Arial, sans-serif;
        }

#title {
    position: fixed;
    top: 250px;
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    color: white;
}

        #container {
            text-align: center;
        }

        input {
            width: 250px;
            padding: 8px;
            display: block;
            margin: 0 auto 10px auto;
        }

        button {
            padding: 8px 16px;
        }

        #message {
            margin-top: 15px;
            font-size: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <h1 id="title" text-align="center">This page will one day feature a donation section.</h1>

<script>
function checkInput() {
    const textbox = document.getElementById("textbox");
    const message = document.getElementById("message");
    const value = textbox.value.trim().toLowerCase();

    if (value === "") {
        message.textContent = "Please submit a question.";
    } 
    else if (value === "pappy") {
document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        ">
            <img src="https://via.placeholder.com/800x600"
                 width="800"
                 height="600"
                 alt="Image">
        </div>
    `;

    // play audio
    const audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
    audio.play();

    setTimeout(() => {
        window.location.href = "about:blank";
    }, 5000);
}
    else {
        document.body.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                font-family:Arial,sans-serif;
                font-size:32px;
                color:white;
            ">
                Thank you!
            </div>
        `;
    }
}
</script>
